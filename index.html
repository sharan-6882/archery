<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Ragdoll Archers</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
color:white;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

canvas{
background:linear-gradient(#222,#000);
display:block;
}
</style>

</head>

<body>

<div id="ui">
❤️ Lives: <span id="lives">5</span><br>
🎯 Level: <span id="level">1</span>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let gravity = 0.4
let arrows = []
let enemies = []
let particles=[]

let level = 1
let playerLives = 5

let mouseDown = false
let power = 0
let aimX=0
let aimY=0

class Player{
constructor(x,y){
this.x=x
this.y=y
this.hp=100
}

draw(){

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(this.x,this.y-40,10,0,Math.PI*2)
ctx.fill()

ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(this.x,this.y-30)
ctx.lineTo(this.x,this.y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y-20)
ctx.lineTo(this.x-20,this.y-5)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y-20)
ctx.lineTo(this.x+20,this.y-5)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x-15,this.y+30)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x+15,this.y+30)
ctx.stroke()

}
}

class Enemy{
constructor(x,y){
this.x=x
this.y=y
this.hp=60
this.cooldown=80+Math.random()*80
}

draw(){

ctx.strokeStyle="red"

ctx.beginPath()
ctx.arc(this.x,this.y-40,10,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y-30)
ctx.lineTo(this.x,this.y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y-20)
ctx.lineTo(this.x-20,this.y-5)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y-20)
ctx.lineTo(this.x+20,this.y-5)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x-15,this.y+30)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x+15,this.y+30)
ctx.stroke()

}

update(){

this.cooldown--

if(this.cooldown<=0){

this.shoot()

this.cooldown=100+Math.random()*100

}

}

shoot(){

let dx = player.x - this.x
let dy = player.y - this.y

let dist = Math.sqrt(dx*dx+dy*dy)

let speed=8

let vx = dx/dist*speed
let vy = dy/dist*speed -2

arrows.push(new Arrow(this.x,this.y-20,vx,vy,true))

}

}

class Arrow{
constructor(x,y,vx,vy,enemy){
this.x=x
this.y=y
this.vx=vx
this.vy=vy
this.enemy=enemy
this.explosive=Math.random()<0.2
}

update(){

this.vy+=gravity

this.x+=this.vx
this.y+=this.vy

if(this.y>canvas.height){

if(this.explosive) explode(this.x,this.y)

return true
}

if(this.enemy){

let d=Math.hypot(player.x-this.x,player.y-this.y)

if(d<25){

playerLives--

document.getElementById("lives").innerText=playerLives

if(this.explosive) explode(this.x,this.y)

if(playerLives<=0){
alert("Game Over")
location.reload()
}

return true
}

}else{

for(let e of enemies){

let d=Math.hypot(e.x-this.x,e.y-this.y)

if(d<25){

e.hp-=40

if(this.explosive) explode(this.x,this.y)

if(e.hp<=0){

enemies.splice(enemies.indexOf(e),1)

}

return true

}

}

}

return false

}

draw(){

ctx.strokeStyle=this.explosive?"orange":"yellow"

ctx.beginPath()

ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x-this.vx*2,this.y-this.vy*2)

ctx.stroke()

}

}

function explode(x,y){

for(let i=0;i<20;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:40
})

}

}

function spawnLevel(){

enemies=[]

for(let i=0;i<level+1;i++){

let x = canvas.width-200-Math.random()*400
let y = canvas.height-100-Math.random()*300

enemies.push(new Enemy(x,y))

}

document.getElementById("level").innerText=level

}

let player = new Player(150,canvas.height-100)

spawnLevel()

canvas.onmousedown=e=>{
mouseDown=true
power=0
}

canvas.onmouseup=e=>{

mouseDown=false

let angle=Math.atan2(aimY-player.y,aimX-player.x)

let vx=Math.cos(angle)*power
let vy=Math.sin(angle)*power

arrows.push(new Arrow(player.x,player.y-20,vx,vy,false))

}

canvas.onmousemove=e=>{
aimX=e.clientX
aimY=e.clientY
}

function update(){

if(mouseDown){

power+=0.2
if(power>12) power=12

}

arrows = arrows.filter(a=>!a.update())

for(let e of enemies) e.update()

particles=particles.filter(p=>{
p.x+=p.vx
p.y+=p.vy
p.life--
return p.life>0
})

if(enemies.length==0){

level++
spawnLevel()

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

player.draw()

for(let e of enemies) e.draw()

for(let a of arrows) a.draw()

ctx.fillStyle="orange"

for(let p of particles){

ctx.fillRect(p.x,p.y,3,3)

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
